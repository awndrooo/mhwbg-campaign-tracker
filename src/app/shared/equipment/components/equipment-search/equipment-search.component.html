<mat-form-field>
  <mat-icon matPrefix>search</mat-icon>
  <mat-label>Find Equipment...</mat-label>
  <input
    matInput
    type="text"
    #searchInput
    (keyup)="this.Search$.next(searchInput.value)"
    />
  </mat-form-field>
  <mat-list>
    @for (item of this.SearchResult$ | async; track item) {
      <mat-list-item>
        <app-equipment-icon [equipment]="item" matListItemIcon class="list-equipment-icon "></app-equipment-icon>
        #{{ item.cardNumber }}
        {{ item.name }}
        {{ item.equipmentType === 'Weapon' ? '(' + item.weaponType + ')' : '' }}
        <button mat-icon-button (click)="this.OnEquipmentAdd.next(item)">
          <mat-icon>add</mat-icon>
        </button>
      </mat-list-item>
    }
  </mat-list>
